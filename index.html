<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Vinoth Murugan — DevOps Engineer</title>
      <link
         href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap"
         rel="stylesheet"
      />
      <style>
         :root {
            --bg: #080510;
            --bg2: #0d0a1a;
            --bg3: #130e24;
            --gold: #c9a84c;
            --gold2: #e8c97a;
            --gold3: #f5e4b0;
            --purple: #7b35d8;
            --purple2: #9d5fea;
            --cream: #ede0cc;
            --muted: #7a6e88;
            --border: rgba(201, 168, 76, 0.18);
         }
         *,
         *::before,
         *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }
         html {
            scroll-behavior: smooth;
         }
         body {
            background: var(--bg);
            color: var(--cream);
            font-family: "DM Sans", sans-serif;
            overflow-x: hidden;
         }

         /* ── grid bg ── */
         body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(
                  rgba(201, 168, 76, 0.03) 1px,
                  transparent 1px
               ),
               linear-gradient(
                  90deg,
                  rgba(201, 168, 76, 0.03) 1px,
                  transparent 1px
               );
            background-size: 64px 64px;
            pointer-events: none;
            z-index: 0;
         }

         /* ── NAV ── */
         nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 64px;
            background: rgba(8, 5, 16, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
         }
         .nav-logo {
            font-family: "Playfair Display", serif;
            font-weight: 900;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.02em;
         }
         .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
         }
         .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
         }
         .nav-links a::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.35s;
         }
         .nav-links a:hover {
            color: var(--gold2);
         }
         .nav-links a:hover::after {
            width: 100%;
         }

         /* ── HERO (Magazine) ── */
         #hero {
            min-height: 100vh;
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 420px;
            padding: 130px 64px 80px;
            gap: 60px;
            align-items: center;
            overflow: hidden;
         }

         .hero-glow {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
         }
         .glow1 {
            width: 600px;
            height: 600px;
            background: rgba(123, 53, 216, 0.12);
            top: -100px;
            right: -100px;
         }
         .glow2 {
            width: 400px;
            height: 400px;
            background: rgba(201, 168, 76, 0.08);
            bottom: 0;
            left: 100px;
         }

         .hero-left {
            position: relative;
            z-index: 2;
         }

         .hero-issue {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 32px;
            padding: 7px 16px;
            border: 1px solid var(--border);
         }
         .hero-issue::before {
            content: "";
            width: 24px;
            height: 1px;
            background: var(--gold);
         }

         .hero-headline {
            font-family: "Playfair Display", serif;
            font-size: clamp(4rem, 6.5vw, 8rem);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
         }
         .hero-headline .line1 {
            color: var(--cream);
         }
         .hero-headline .line2 {
            display: block;
            background: linear-gradient(
               135deg,
               var(--gold) 0%,
               var(--gold2) 50%,
               var(--purple2) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }
         .hero-headline .line3 {
            display: block;
            font-style: italic;
            color: var(--purple2);
            font-size: 0.55em;
            letter-spacing: 0.01em;
            margin-top: 12px;
         }

         .hero-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--purple));
            margin: 32px 0;
         }

         .hero-desc {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--muted);
            max-width: 560px;
            margin-bottom: 44px;
            font-weight: 300;
         }

         .hero-ctas {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
         }

         .btn-gold {
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--bg);
            font-family: "DM Sans", sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
         }
         .btn-gold::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold2), var(--gold3));
            opacity: 0;
            transition: opacity 0.3s;
         }
         .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(201, 168, 76, 0.35);
         }
         .btn-gold:hover::after {
            opacity: 1;
         }
         .btn-gold span {
            position: relative;
            z-index: 1;
         }

         .btn-ghost {
            padding: 13px 36px;
            background: transparent;
            color: var(--gold);
            font-family: "DM Sans", sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
         }
         .btn-ghost:hover {
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.06);
            transform: translateY(-2px);
         }

         /* Hero right card */
         .hero-right {
            position: relative;
            z-index: 2;
         }

         .profile-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 40px 36px;
            position: relative;
         }
         .profile-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(
               90deg,
               var(--purple),
               var(--gold),
               var(--purple2)
            );
         }
         .profile-avatar {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--purple), var(--purple2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Playfair Display", serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--cream);
            margin-bottom: 20px;
            border: 3px solid rgba(201, 168, 76, 0.3);
         }
         .profile-name {
            font-family: "Playfair Display", serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 4px;
         }
         .profile-role {
            font-size: 0.78rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
         }

         .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px;
            background: var(--border);
            margin-bottom: 28px;
         }
         .pstat {
            background: var(--bg3);
            padding: 16px 12px;
            text-align: center;
         }
         .pstat-num {
            font-family: "Playfair Display", serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }
         .pstat-label {
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 2px;
         }

         .profile-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
         }
         .pinfo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
         }
         .pinfo-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(201, 168, 76, 0.08);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            flex-shrink: 0;
         }
         .pinfo-text {
            color: var(--muted);
         }
         .pinfo-text strong {
            color: var(--cream);
            font-weight: 500;
         }

         /* ── SECTION COMMON ── */
         section {
            position: relative;
            z-index: 1;
         }
         .section-inner {
            max-width: 1160px;
            margin: 0 auto;
            padding: 100px 64px;
         }

         .mag-label {
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: "DM Mono", monospace;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
         }
         .mag-label::before {
            content: "";
            width: 32px;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
         }
         .mag-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(
               90deg,
               rgba(201, 168, 76, 0.15),
               transparent
            );
         }

         .mag-title {
            font-family: "Playfair Display", serif;
            font-size: clamp(2.2rem, 4vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 60px;
            letter-spacing: -0.02em;
            line-height: 1.1;
         }
         .mag-title em {
            font-style: italic;
            background: linear-gradient(135deg, var(--gold), var(--purple2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         /* ── ABOUT ── */
         #about {
            background: var(--bg2);
         }

         .about-layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 80px;
            align-items: start;
         }

         .about-body p {
            font-size: 0.95rem;
            line-height: 1.95;
            color: var(--muted);
            margin-bottom: 22px;
            font-weight: 300;
         }
         .about-body p strong {
            color: var(--cream);
            font-weight: 500;
         }

         .about-pull {
            background: var(--bg3);
            border-left: 3px solid var(--gold);
            padding: 24px 28px;
            margin-top: 36px;
            font-family: "Playfair Display", serif;
            font-style: italic;
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--gold3);
         }

         .about-aside {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 8px;
         }

         .aside-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 24px 28px;
            position: relative;
            transition:
               border-color 0.3s,
               transform 0.3s;
         }
         .aside-card:hover {
            border-color: rgba(201, 168, 76, 0.4);
            transform: translateX(4px);
         }
         .aside-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--gold), var(--purple));
            opacity: 0;
            transition: opacity 0.3s;
         }
         .aside-card:hover::before {
            opacity: 1;
         }
         .aside-card-label {
            font-family: "DM Mono", monospace;
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 7px;
         }
         .aside-card-val {
            font-size: 0.9rem;
            color: var(--cream);
            font-weight: 400;
         }

         /* ── SKILLS ── */
         #skills {
            background: var(--bg);
         }

         .skills-wrap {
            display: flex;
            flex-direction: column;
            gap: 48px;
         }

         .skill-group-title {
            font-family: "Playfair Display", serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--gold2);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
         }
         .skill-group-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
         }

         .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
         }

         .stag {
            padding: 9px 18px;
            background: var(--bg3);
            border: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
            font-family: "DM Mono", monospace;
            letter-spacing: 0.04em;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
         }
         .stag::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
               135deg,
               rgba(123, 53, 216, 0.12),
               rgba(201, 168, 76, 0.08)
            );
            opacity: 0;
            transition: opacity 0.3s;
         }
         .stag:hover {
            border-color: var(--gold);
            color: var(--gold2);
            transform: translateY(-2px);
         }
         .stag:hover::before {
            opacity: 1;
         }

         /* ── EXPERIENCE ── */
         #experience {
            background: var(--bg2);
         }

         .exp-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 0;
         }

         .exp-nav {
            border-right: 1px solid var(--border);
            padding-right: 40px;
         }
         .exp-nav-item {
            padding: 16px 0;
            cursor: pointer;
            border-bottom: 1px solid rgba(201, 168, 76, 0.07);
            transition: all 0.3s;
         }
         .exp-nav-item.active .enav-role {
            color: var(--gold2);
         }
         .exp-nav-item.active .enav-line {
            width: 24px;
            background: var(--gold);
         }
         .enav-period {
            font-family: "DM Mono", monospace;
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            color: var(--purple2);
            margin-bottom: 5px;
         }
         .enav-role {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            transition: color 0.3s;
         }
         .enav-line {
            width: 0;
            height: 1px;
            background: transparent;
            margin-top: 8px;
            transition: all 0.4s;
         }
         .exp-nav-item:hover .enav-role {
            color: var(--cream);
         }

         .exp-panels {
            padding-left: 56px;
         }
         .exp-panel {
            display: none;
         }
         .exp-panel.active {
            display: block;
            animation: panelIn 0.4s ease;
         }

         @keyframes panelIn {
            from {
               opacity: 0;
               transform: translateX(12px);
            }
            to {
               opacity: 1;
               transform: translateX(0);
            }
         }

         .ep-header {
            margin-bottom: 28px;
         }
         .ep-role {
            font-family: "Playfair Display", serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 6px;
         }
         .ep-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
         }
         .ep-company {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 500;
         }
         .ep-period {
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--purple2);
            padding: 3px 10px;
            border: 1px solid var(--borderp);
         }

         .ep-points {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
         }
         .ep-points li {
            font-size: 0.88rem;
            line-height: 1.8;
            color: var(--muted);
            padding-left: 22px;
            position: relative;
            font-weight: 300;
         }
         .ep
